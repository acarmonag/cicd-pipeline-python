AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudFormation template para desplegar la aplicacion Calculadora en ECS Fargate
  con ALB. Usa la VPC por defecto y el LabRole existente.

Parameters:
  EnvironmentName:
    Type: String
    Description: "Nombre del entorno (ej: staging, production). Usado para nombrar recursos."
    AllowedValues: [staging, production]
  DockerImageUri:
    Type: String
    Description: "URI completo de la imagen Docker a desplegar (ej: usuario/repo:tag)."
  LabRoleArn:
    Type: String
    Description: ARN completo del rol IAM 'LabRole' existente en la cuenta.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID de la VPC por defecto donde desplegar.
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Lista de al menos DOS IDs de subredes PuBLICAS de la VPC por defecto en diferentes AZs.

Resources:
  ECSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/calculadora-${EnvironmentName}-task'
      RetentionInDays: 7
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub 'calculadora-${EnvironmentName}-cluster'
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'alb-sg-${EnvironmentName}'
      GroupDescription: Permite trafico HTTP al ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ECSServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub 'ecs-service-sg-${EnvironmentName}'
      GroupDescription: Permite trafico desde el ALB al servicio ECS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup # Solo permite desde el ALB SG
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'calculadora-${EnvironmentName}-alb'
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Scheme: internet-facing
      Type: application
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ECSTargetGroup

  ECSTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub 'tg-ecs-${EnvironmentName}'
      VpcId: !Ref VpcId
      Port: 8000
      Protocol: HTTP
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: /health # Endpoint de health check de la app
      HealthCheckPort: '8000'
      HealthCheckProtocol: HTTP
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      HealthCheckIntervalSeconds: 15
      HealthCheckTimeoutSeconds: 5
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn: ECSLogGroup
    Properties:
      Family: !Sub 'calculadora-${EnvironmentName}-task'
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: '256'
      Memory: '512'
      TaskRoleArn: !Ref LabRoleArn
      ExecutionRoleArn: !Ref LabRoleArn
      ContainerDefinitions:
        - Name: !Sub 'calculadora-${EnvironmentName}-container'
          Image: !Ref DockerImageUri
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub 'calculadora-${EnvironmentName}-service'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ECSTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ECSServiceSecurityGroup
      LoadBalancers:
        - ContainerName: !Sub 'calculadora-${EnvironmentName}-container'
          ContainerPort: 8000
          TargetGroupArn: !Ref ECSTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
    DependsOn:
      - ALBListener
  CalculadoraECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub 'calculadora-${EnvironmentName}'
      ImageScanningConfiguration:
        scanOnPush: true
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
          
Outputs:
  ALBDnsName:
    Description: DNS Name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALBDnsName'
  ECSClusterName:
    Description: Name of the ECS Cluster
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${AWS::StackName}-ECSClusterName'
  ECSServiceName:
    Description: Name of the ECS Service
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub '${AWS::StackName}-ECSServiceName'
  ECRRepositoryUri:
    Description: URI del repositorio ECR creado para la Calculadora
    Value: !GetAtt CalculadoraECRRepository.RepositoryUri
    Export:
      Name: !Sub '${AWS::StackName}-ECRRepositoryUri'